<section class="rounded-3xl border border-gray-100 bg-white p-6 shadow-sm sm:p-8">
    <h2 class="mb-5 text-lg font-bold tracking-tight text-gray-900">최근 본 상품</h2>

    <div class="space-y-3">
        {% for product in recent_products %}
        <div
            class="flex items-center justify-between rounded-2xl border border-gray-100 p-4 shadow-sm transition-all duration-200 hover:border-gray-200 hover:shadow-md">
            <span class="text-sm font-medium text-gray-900">{{ product }}</span>
            <button type="button"
                class="text-sm font-medium text-red-600 transition-colors hover:text-red-700">보기</button>
        </div>
        {% endfor %}
    </div>
</section>
