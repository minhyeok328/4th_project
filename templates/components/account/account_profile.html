<section class="rounded-3xl border border-gray-100 bg-white p-6 shadow-sm sm:p-8">
    <div class="flex items-center gap-5 sm:gap-6">
        {% if request.user.profile_picture %}
        <img src="{{ request.user.profile_picture.url }}" alt="프로필"
            class="h-20 w-20 shrink-0 rounded-full object-cover ring-2 ring-gray-100 sm:h-24 sm:w-24">
        {% else %}
        <div
            class="flex h-20 w-20 shrink-0 items-center justify-center rounded-full bg-red-50 text-2xl font-bold text-red-600 ring-2 ring-red-100 sm:h-24 sm:w-24">
            {{ request.user.nickname|slice:":1"|upper }}
        </div>
        {% endif %}

        <div>
            <h2 class="text-xl font-bold tracking-tight text-gray-900 sm:text-2xl">{{ request.user.nickname }}님</h2>
            <p class="mt-1 text-sm text-gray-500">{{ request.user.email }}</p>
        </div>
    </div>

    <button type="button"
        class="mt-6 w-full rounded-full border border-gray-200 bg-white px-4 py-2.5 text-sm font-medium text-gray-700 shadow-sm transition-all duration-200 hover:border-gray-300 hover:bg-gray-50 hover:shadow">
        프로필 수정
    </button>
</section>
