{% load humanize %}
<a href="{% url 'products:productpage' product_code=product.product_code %}"
    class="group block overflow-hidden rounded-3xl border border-gray-200/70 bg-white p-5 shadow-sm transition-all duration-200 hover:-translate-y-0.5 hover:border-red-200 hover:shadow-md sm:p-6">
    <div
        class="mb-4 flex h-40 items-center justify-center overflow-hidden rounded-2xl bg-gray-50 text-sm text-gray-300 sm:h-44">
        {% if product.img_link %}
        <img src="{{ product.img_link }}" alt="{{ product.name }}"
            class="h-full w-full object-cover transition-transform duration-300 group-hover:scale-105" />
        {% else %}
        이미지
        {% endif %}
    </div>

    <p class="mb-1.5 text-[11px] font-semibold uppercase tracking-[0.14em] text-red-600">
        {% include "components/category_label.html" %}
    </p>

    <h2 class="mb-3 line-clamp-2 text-base font-bold leading-snug tracking-tight text-gray-900">{{ product.name }}</h2>

    {% if product.price %}
    <p class="text-lg font-extrabold tracking-tight text-gray-900">{{ product.price|floatformat:0|intcomma }}<span class="ml-0.5 text-sm font-semibold text-gray-500">원</span></p>
    {% else %}
    <p class="text-lg font-semibold text-gray-400">품절</p>
    {% endif %}
</a>
