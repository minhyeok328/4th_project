<form id="chat-input-form"
    data-send-chat-url="{% url 'api:send_chat' %}"
    data-csrf-token="{{ csrf_token }}"
    data-chatpage-url="{% url 'chats:chatpage' %}"
    data-chat-id="{{ request.GET.chat_id|default:'' }}"
    class="flex gap-3 border-t border-gray-200/70 bg-white p-4 sm:p-5">
    <input type="text" id="chat-input-field" placeholder="메시지를 입력하세요." autocomplete="off"
        class="flex-1 rounded-2xl border border-gray-200 bg-gray-50/80 px-4 py-3 text-sm text-gray-900 outline-none transition-all placeholder:text-gray-400 focus:border-red-500 focus:bg-white focus:ring-2 focus:ring-red-500/15 disabled:cursor-not-allowed disabled:opacity-60" />

    <button type="submit" id="chat-input-submit"
        class="shrink-0 rounded-2xl bg-red-600 px-6 py-3 text-sm font-semibold tracking-tight text-white shadow-sm transition-all duration-200 hover:bg-red-700 hover:shadow disabled:cursor-not-allowed disabled:opacity-60">
        전송
    </button>
</form>
