<div class="border-b border-gray-200/70 px-6 py-5 sm:px-8 sm:py-6">
    <h1 class="text-xl font-bold tracking-tight text-gray-900 sm:text-2xl">LG 챗봇</h1>
    <p class="mt-1.5 text-sm leading-relaxed text-gray-500">
        원하는 가전 조건을 입력하면 AI가 상품을 추천해줍니다.
    </p>
</div>

<div id="chat-recommended" class="{% if chats %}hidden{% else %}flex{% endif %} flex-1 items-center justify-center p-6 sm:p-8">
    <div class="w-full max-w-2xl text-center">
        <h2 class="mb-2 text-xl font-bold tracking-tight text-gray-900 sm:text-2xl">무엇을 도와드릴까요?</h2>

        <p class="mb-8 text-sm leading-relaxed text-gray-500 sm:text-base">
            원하는 가전 조건을 선택하거나 직접 입력해보세요.
        </p>

        <div class="grid gap-3 sm:grid-cols-2">
            <button type="button" data-recommended-question="가성비 좋은 TV 추천해줘"
                class="rounded-2xl border border-gray-200/70 bg-white p-4 text-left text-sm leading-relaxed text-gray-700 shadow-sm transition-all duration-200 hover:-translate-y-0.5 hover:border-red-200 hover:bg-red-50/20 hover:text-gray-900 hover:shadow-md">
                가성비 좋은 TV 추천해줘
            </button>
            <button type="button" data-recommended-question="3인 가족용 세탁기 뭐가 좋을까?"
                class="rounded-2xl border border-gray-200/70 bg-white p-4 text-left text-sm leading-relaxed text-gray-700 shadow-sm transition-all duration-200 hover:-translate-y-0.5 hover:border-red-200 hover:bg-red-50/20 hover:text-gray-900 hover:shadow-md">
                3인 가족용 세탁기 뭐가 좋을까?
            </button>
            <button type="button" data-recommended-question="소형 원룸용 냉장고 찾아줘"
                class="rounded-2xl border border-gray-200/70 bg-white p-4 text-left text-sm leading-relaxed text-gray-700 shadow-sm transition-all duration-200 hover:-translate-y-0.5 hover:border-red-200 hover:bg-red-50/20 hover:text-gray-900 hover:shadow-md">
                소형 원룸용 냉장고 찾아줘
            </button>
            <button type="button" data-recommended-question="거실용 에어컨 용량 추천"
                class="rounded-2xl border border-gray-200/70 bg-white p-4 text-left text-sm leading-relaxed text-gray-700 shadow-sm transition-all duration-200 hover:-translate-y-0.5 hover:border-red-200 hover:bg-red-50/20 hover:text-gray-900 hover:shadow-md">
                거실용 에어컨 용량 추천
            </button>
        </div>
    </div>
</div>

<div id="chat-messages" class="{% if chats %}block{% else %}hidden{% endif %} min-h-0 flex-1 overflow-y-auto bg-[#fafafb] px-6 py-5 sm:px-8">
    <div id="chat-messages-list" class="space-y-4">
        {% for msg in chats %}
        <div data-server-message data-role="{% if msg.is_userchat %}user{% else %}assistant{% endif %}"
            class="{% if msg.is_userchat %}ml-auto max-w-[70%] rounded-2xl bg-red-600 px-5 py-4 text-white{% else %}max-w-[70%] rounded-2xl bg-gray-100 px-5 py-4 text-gray-900{% endif %}">
            {{ msg.content }}
        </div>
        {% endfor %}
    </div>
</div>

<form id="chat-input-form"
    data-send-chat-url="{% url 'api:send_chat' %}"
    data-csrf-token="{{ csrf_token }}"
    data-chatpage-url="{% url 'chats:chatpage' %}"
    data-chat-id="{{ request.GET.chat_id|default:'' }}"
    class="flex gap-3 border-t border-gray-200/70 bg-white p-4 sm:p-5">
    <input type="text" id="chat-input-field" placeholder="메시지를 입력하세요." autocomplete="off"
        class="flex-1 rounded-2xl border border-gray-200 bg-gray-50/80 px-4 py-3 text-sm text-gray-900 outline-none transition-all placeholder:text-gray-400 focus:border-red-500 focus:bg-white focus:ring-2 focus:ring-red-500/15 disabled:cursor-not-allowed disabled:opacity-60" />

    <button type="submit" id="chat-input-submit"
        class="shrink-0 rounded-2xl bg-red-600 px-6 py-3 text-sm font-semibold tracking-tight text-white shadow-sm transition-all duration-200 hover:bg-red-700 hover:shadow disabled:cursor-not-allowed disabled:opacity-60">
        전송
    </button>
</form>
