{% extends "base_page.html" %}
{% load static %}

{% block title %}회원가입{% endblock %}

{% block content %}
{% include "components/header.html" %}

<div class="min-h-screen bg-neutral-50 text-gray-900">
    <main class="flex min-h-[calc(100vh-64px)] items-center justify-center px-4 py-10 sm:px-6">
        <section class="w-full max-w-md rounded-3xl border border-gray-100 bg-white p-8 shadow-sm sm:p-10">
            <h1 class="mb-2 text-center text-2xl font-bold tracking-tight text-gray-900 sm:text-3xl">회원가입</h1>
            <p class="mb-8 text-center text-sm leading-relaxed text-gray-500">
                LG 가전 추천 서비스 계정을 만듭니다.
            </p>

            <form method="post" enctype="multipart/form-data" class="space-y-5">
                {% csrf_token %}
                <div>
                    <label class="mb-2 block text-sm font-medium text-gray-900">아이디</label>
                    <input type="text" name="username" placeholder="아이디를 입력하세요" required autocomplete="username"
                        class="w-full rounded-xl border border-gray-200 bg-gray-50 px-4 py-3 text-sm text-gray-900 outline-none transition-all placeholder:text-gray-400 focus:border-red-500 focus:bg-white focus:ring-2 focus:ring-red-500/20" />
                </div>
                <div>
                    <label class="mb-2 block text-sm font-medium text-gray-900">비밀번호</label>
                    <input type="password" name="password" placeholder="비밀번호를 입력하세요" required autocomplete="new-password"
                        class="w-full rounded-xl border border-gray-200 bg-gray-50 px-4 py-3 text-sm text-gray-900 outline-none transition-all placeholder:text-gray-400 focus:border-red-500 focus:bg-white focus:ring-2 focus:ring-red-500/20" />
                </div>
                <div>
                    <label class="mb-2 block text-sm font-medium text-gray-900">닉네임</label>
                    <input type="text" name="nickname" placeholder="닉네임 (최대 12자)" required maxlength="12"
                        class="w-full rounded-xl border border-gray-200 bg-gray-50 px-4 py-3 text-sm text-gray-900 outline-none transition-all placeholder:text-gray-400 focus:border-red-500 focus:bg-white focus:ring-2 focus:ring-red-500/20" />
                </div>
                <div>
                    <label class="mb-2 block text-sm font-medium text-gray-900">프로필 사진 (선택)</label>
                    <input type="file" name="profile_picture" accept="image/*"
                        class="w-full text-sm text-gray-600 file:mr-4 file:rounded-xl file:border-0 file:bg-red-50 file:px-4 file:py-2 file:text-sm file:font-semibold file:text-red-700 hover:file:bg-red-100" />
                </div>

                <button type="submit"
                    class="w-full rounded-full bg-red-600 py-3 text-sm font-semibold text-white shadow-sm transition-all duration-200 hover:bg-red-700 hover:shadow-md">
                    가입하기
                </button>
            </form>

            <p class="mt-6 text-center text-sm text-gray-500">
                이미 계정이 있으신가요?
                <a href="{% url 'accounts:loginpage' %}" class="font-medium text-red-600 transition-colors hover:text-red-700">로그인</a>
            </p>
        </section>
    </main>
</div>
{% endblock %}
