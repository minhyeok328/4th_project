{# 공통 레이아웃: Tailwind, block content / extra_head / extra_js — 페이지별 extends #}
{% load static tailwind_tags %}
<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}LG 가전{% endblock %}</title>
    {% tailwind_css %}
    {% block extra_head %}{% endblock %}
</head>

<body class="min-h-screen bg-[#f5f5f7] text-gray-900 antialiased selection:bg-red-100 selection:text-red-900">
    {% block content %}{% endblock %}
    {% block extra_js %}{% endblock %}
</body>

</html>
